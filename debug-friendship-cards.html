<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Star Odyssey Friendship Cards Debug</title>
    <link rel="stylesheet" href="./src/debug-card-review.css" />
  </head>
  <body class="debug-card-page">
    <main class="debug-card-shell">
      <header class="debug-card-header">
        <p>Star Odyssey Debug</p>
        <h1>Freundschaftskarten</h1>
        <nav class="debug-card-nav" aria-label="Debug navigation">
          <a href="./debug-upgrades.html">Upgrade Debug</a>
          <a href="./debug-outposts.html">Outpost Debug</a>
          <a href="./debug-colonies.html">Kolonien Debug</a>
          <a href="./debug-spaceports.html">Raumhäfen Debug</a>
          <a href="./debug-friendship-cards.html" aria-current="page">Freundschaftskarten Debug</a>
          <a href="./debug-encounter-cards.html">Begegnungskarten Debug</a>
        </nav>
      </header>

      <section class="debug-card-controls" aria-label="Filter">
        <label>
          Suche
          <input id="card-search" type="search" placeholder="ID, Titel, Text ..." />
        </label>
        <label>
          Volk / Außenposten
          <select id="people-filter"></select>
        </label>
        <label>
          Implementierung
          <select id="implemented-filter">
            <option value="all">Alle</option>
            <option value="implemented">Implementiert</option>
            <option value="pending">Nicht implementiert</option>
          </select>
        </label>
        <div class="debug-card-actions">
          <button id="expand-all" type="button">Alle aufklappen</button>
          <button id="collapse-all" type="button">Alle einklappen</button>
        </div>
      </section>

      <section id="card-stats" class="debug-card-stats" aria-label="Zählung"></section>
      <section id="card-list" class="debug-card-list" aria-label="Freundschaftskarten"></section>
    </main>

    <script type="module" src="./src/debug-friendship-cards.js"></script>
  </body>
</html>
