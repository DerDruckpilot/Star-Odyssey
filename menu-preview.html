<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Star Odyssey · Menu Preview</title>
    <link rel="stylesheet" href="./src/menu-button-shared.css">
    <link rel="stylesheet" href="./src/menu-preview.css">
  </head>
  <body>
    <main class="menu-preview-shell">
      <section class="menu-preview-stage" aria-label="Hauptmenü Vorschau">
        <div class="menu-preview-scene" id="menu-preview-scene">
          <img class="menu-layer menu-layer--fill" data-menu-layer="background" src="./public/assets/ui/menu/processed/background/bg_space_base_4k.png" alt="">
          <img class="menu-layer menu-layer--fill menu-layer--screen" data-menu-layer="stars_overlay" src="./public/assets/ui/menu/processed/background/bg_stars_overlay.png" alt="">
          <img class="menu-layer" data-menu-layer="planet" src="./public/assets/ui/menu/processed/background/bg_planet_bottom_left.png" alt="">
          <img class="menu-layer menu-layer--screen" data-menu-layer="galaxy" src="./public/assets/ui/menu/processed/background/bg_galaxy_bottom_right.png" alt="">

          <img class="menu-layer" data-menu-layer="frame_corner_top_left" src="./public/assets/ui/menu/processed/frame/frame_corner_master.png" alt="">
          <img class="menu-layer" data-menu-layer="frame_corner_top_right" src="./public/assets/ui/menu/processed/frame/frame_corner_master.png" alt="">
          <img class="menu-layer" data-menu-layer="frame_corner_bottom_left" src="./public/assets/ui/menu/processed/frame/frame_corner_master.png" alt="">
          <img class="menu-layer" data-menu-layer="frame_corner_bottom_right" src="./public/assets/ui/menu/processed/frame/frame_corner_master.png" alt="">
          <img class="menu-layer menu-layer--stretch" data-menu-layer="frame_top_edge" src="./public/assets/ui/menu/processed/frame/frame_top_edge.png" alt="">
          <img class="menu-layer menu-layer--stretch" data-menu-layer="frame_bottom_edge" src="./public/assets/ui/menu/processed/frame/frame_bottom_edge.png" alt="">
          <img class="menu-layer menu-layer--stretch" data-menu-layer="frame_left_edge" src="./public/assets/ui/menu/processed/frame/frame_left_edge.png" alt="">
          <img class="menu-layer menu-layer--stretch" data-menu-layer="frame_right_edge" src="./public/assets/ui/menu/processed/frame/frame_right_edge.png" alt="">
          <img class="menu-layer" data-menu-layer="frame_top_deco" src="./public/assets/ui/menu/processed/frame/frame_top_deco_left.png" alt="">
          <img class="menu-layer" data-menu-layer="frame_bottom_deco" src="./public/assets/ui/menu/processed/frame/frame_bottom_deco_left.png" alt="">

          <img class="menu-layer menu-layer--screen" data-menu-layer="title_ring_overlay" src="./public/assets/ui/menu/processed/title/title_ring_overlay.png" alt="">
          <img class="menu-layer" data-menu-layer="title_compass_emblem" src="./public/assets/ui/menu/processed/title/title_compass_emblem.png" alt="">
          <img class="menu-layer" data-menu-layer="logo" src="./public/assets/ui/menu/processed/title/logo_space_odyssey.png" alt="Space Odyssey">

          <nav class="menu-button-list" id="menu-button-list" data-menu-layer="buttons_group" aria-label="Hauptmenü"></nav>
        </div>
      </section>

      <aside class="menu-preview-controls" id="menu-preview-controls">
        <nav class="menu-preview-debug-nav" aria-label="Debug Navigation">
          <a href="./debug-upgrades.html">Debug-Seiten</a>
          <a href="./debug-encounter-cards.html">Begegnungskarten Editor</a>
          <a href="./menu-button-preview.html">Button Preview</a>
        </nav>
        <details open>
          <summary>Layout feinjustieren</summary>
          <form id="layout-form" class="menu-preview-form"></form>
          <label class="menu-preview-output">
            Layout JSON
            <textarea id="layout-json" spellcheck="false"></textarea>
          </label>
          <div class="menu-preview-actions">
            <button id="copy-layout" type="button">JSON kopieren</button>
            <button id="reset-layout" type="button">Reset</button>
          </div>
          <p id="menu-preview-log" class="menu-preview-log">Preview bereit.</p>
        </details>
      </aside>
    </main>

    <script type="module" src="./src/menu-preview.js"></script>
  </body>
</html>
